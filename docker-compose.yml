services:
  db:
    image: postgres:16-alpine
    env_file: .env
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-opspilot}
      POSTGRES_USER: ${POSTGRES_USER:-opspilot}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-opspilot}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${POSTGRES_USER:-opspilot}"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

  backend:
    build:
      context: ./backend
    env_file: .env
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:-opspilot}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:-opspilot}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:-opspilot}
    ports:
      - "8080:8080"
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - full-stack

volumes:
  postgres_data:
