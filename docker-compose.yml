services:
  postgres:
    image: postgres:16-alpine
    container_name: opspilot_postgres
    environment:
      POSTGRES_DB: opspilot_desk
      POSTGRES_USER: opspilot
      POSTGRES_PASSWORD: opspilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opspilot -d opspilot_desk"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opspilot_backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/opspilot_desk
      SPRING_DATASOURCE_USERNAME: opspilot
      SPRING_DATASOURCE_PASSWORD: opspilot
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-use-long-random-secret}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-3.5-turbo}
      OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS:-1024}
      OPENROUTER_TEMPERATURE: ${OPENROUTER_TEMPERATURE:-0.7}
      OPENROUTER_TIMEOUT_SECONDS: ${OPENROUTER_TIMEOUT_SECONDS:-30}
      FAKE_AI: ${FAKE_AI:-false}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
    depends_on:
      postgres:
        condition: service_healthy
    profiles:
      - full

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opspilot_frontend
    ports:
      - "4200:80"
    depends_on:
      - backend
    profiles:
      - full

volumes:
  postgres_data:
