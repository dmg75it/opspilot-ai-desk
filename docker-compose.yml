services:
  postgres:
    image: postgres:16-alpine
    container_name: opspilot-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${DB_NAME:-opspilot}
      POSTGRES_USER: ${DB_USER:-opspilot}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-opspilot_dev}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-opspilot} -d ${DB_NAME:-opspilot}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opspilot-backend
    restart: unless-stopped
    profiles: ["full-stack"]
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${DB_NAME:-opspilot}
      DB_USER: ${DB_USER:-opspilot}
      DB_PASSWORD: ${DB_PASSWORD:-opspilot_dev}
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-at-least-256-bits-long-secret-key}
      JWT_EXPIRATION_MS: ${JWT_EXPIRATION_MS:-86400000}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_BASE_URL: ${OPENROUTER_BASE_URL:-https://openrouter.ai/api/v1}
      OPENROUTER_MODEL: ${OPENROUTER_MODEL:-openai/gpt-3.5-turbo}
      OPENROUTER_MAX_TOKENS: ${OPENROUTER_MAX_TOKENS:-2048}
      OPENROUTER_TEMPERATURE: ${OPENROUTER_TEMPERATURE:-0.7}
      OPENROUTER_TIMEOUT_SECONDS: ${OPENROUTER_TIMEOUT_SECONDS:-30}
      AI_PROVIDER: ${AI_PROVIDER:-fake}
      CORS_ALLOWED_ORIGINS: ${CORS_ALLOWED_ORIGINS:-http://localhost:4200}
      SERVER_PORT: ${SERVER_PORT:-8080}
    ports:
      - "${SERVER_PORT:-8080}:8080"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opspilot-frontend
    restart: unless-stopped
    profiles: ["full-stack"]
    depends_on:
      - backend
    environment:
      API_URL: http://backend:8080
    ports:
      - "4200:80"

volumes:
  postgres_data:
    driver: local
