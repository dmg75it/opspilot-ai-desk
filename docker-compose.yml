services:
  postgres:
    image: postgres:16-alpine
    container_name: opspilot-postgres
    environment:
      POSTGRES_DB: opspilot
      POSTGRES_USER: opspilot
      POSTGRES_PASSWORD: opspilot
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U opspilot"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: opspilot-backend
    profiles: [fullstack]
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: jdbc:postgresql://postgres:5432/opspilot
      DATABASE_USERNAME: opspilot
      DATABASE_PASSWORD: opspilot
      JWT_SECRET: ${JWT_SECRET:-change-me-in-production-must-be-at-least-32-chars}
      OPENROUTER_API_KEY: ${OPENROUTER_API_KEY:-}
      OPENROUTER_FAKE_MODE: ${OPENROUTER_FAKE_MODE:-true}
      CORS_ALLOWED_ORIGINS: http://localhost:4200
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: opspilot-frontend
    profiles: [fullstack]
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  postgres_data:
