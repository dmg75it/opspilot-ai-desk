spring.application.name=opspilot-ai-desk

# DataSource — reads from environment / .env via spring-dotenv
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/opspilot}
spring.datasource.username=${POSTGRES_USER:opspilot}
spring.datasource.password=${POSTGRES_PASSWORD:opspilot}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.validate-on-migrate=true
spring.flyway.clean-disabled=true

# JWT
jwt.secret=${JWT_SECRET}
jwt.expiration-ms=${JWT_EXPIRATION_MS:3600000}

# CORS
cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:4200}

# Virtual threads (Java 21+)
spring.threads.virtual.enabled=true

# OpenAPI
springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.try-it-out-enabled=true
springdoc.swagger-ui.persist-authorization=true

# Actuator
management.endpoints.web.exposure.include=health

# Logging
logging.level.com.opspilot=INFO
