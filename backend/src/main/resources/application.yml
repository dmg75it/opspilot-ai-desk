spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:opspilot_desk}
    username: ${DB_USER:opspilot}
    password: ${DB_PASSWORD:opspilot}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    open-in-view: false
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  port: 8080
  error:
    include-message: always

jwt:
  secret: ${JWT_SECRET:development-secret-key-change-in-production-minimum-32-chars}
  expiration-ms: ${JWT_EXPIRATION_MS:86400000}

openrouter:
  api-key: ${OPENROUTER_API_KEY:}
  base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
  model: ${OPENROUTER_MODEL:openai/gpt-3.5-turbo}
  max-tokens: ${OPENROUTER_MAX_TOKENS:1024}
  temperature: ${OPENROUTER_TEMPERATURE:0.7}
  timeout-seconds: ${OPENROUTER_TIMEOUT_SECONDS:30}

app:
  fake-ai: ${FAKE_AI:false}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

logging:
  level:
    com.opspilot: INFO
    org.springframework.security: WARN
