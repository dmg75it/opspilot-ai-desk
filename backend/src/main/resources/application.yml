spring:
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:opspilot}
    username: ${DB_USER:opspilot}
    password: ${DB_PASSWORD:opspilot_dev}
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

server:
  port: ${SERVER_PORT:8080}

security:
  jwt:
    secret: ${JWT_SECRET:dev-secret-key-at-least-256-bits-long-change-in-prod-abc123}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}

ai:
  provider: ${AI_PROVIDER:fake}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    model: ${OPENROUTER_MODEL:openai/gpt-3.5-turbo}
    max-tokens: ${OPENROUTER_MAX_TOKENS:2048}
    temperature: ${OPENROUTER_TEMPERATURE:0.7}
    timeout-seconds: ${OPENROUTER_TIMEOUT_SECONDS:30}

cors:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

logging:
  level:
    com.opspilot.desk: INFO
    org.springframework.security: WARN
