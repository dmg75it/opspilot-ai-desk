server:
  port: 8080

spring:
  datasource:
    url: ${DATABASE_URL:jdbc:postgresql://localhost:5432/opspilot}
    username: ${DATABASE_USERNAME:opspilot}
    password: ${DATABASE_PASSWORD:opspilot}
    hikari:
      maximum-pool-size: 10
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

app:
  jwt:
    secret: ${JWT_SECRET:change-me-in-production-must-be-at-least-32-characters-long}
    expiration-ms: ${JWT_EXPIRATION_MS:86400000}
  openrouter:
    api-key: ${OPENROUTER_API_KEY:}
    base-url: ${OPENROUTER_BASE_URL:https://openrouter.ai/api/v1}
    model: ${OPENROUTER_MODEL:openai/gpt-3.5-turbo}
    timeout-seconds: ${OPENROUTER_TIMEOUT_SECONDS:30}
    max-tokens: ${OPENROUTER_MAX_TOKENS:1000}
    temperature: ${OPENROUTER_TEMPERATURE:0.7}
    fake-mode: ${OPENROUTER_FAKE_MODE:true}
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    io.opspilot.desk: INFO
    org.springframework.security: WARN
